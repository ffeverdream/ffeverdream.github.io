<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>deoxys</title>
<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono&display=swap" rel="stylesheet">
</head>

<body>

<div id="enter-screen">
<h1>deoxys</h1>
</div>

<video autoplay muted loop id="bg-video">
<source src="images/bgvid.mp4" type="video/mp4">
</video>

<audio id="bgmusic" loop>
<source src="music/bgmusic.mp3" type="audio/mpeg">
</audio>

<img src="images/profilelogo.png" class="logo">

<div class="txtbox">

<input id="volumeSlider" type="range" min="0" max="1" step="0.01" value="0.5">

<img src="images/deoxyspfp.png" class="pfp">

<h1>
deoxys
<span class="badge-container">
<img src="images/badge.png" class="badge">
<span class="badge-tooltip">Owner</span>
</span>
</h1>

<p>
Deoxys is a Psychic-type Mythical Pokémon introduced in Generation III.<br>
It is known as the DNA Pokémon and can change its form.<br>
Normal, Attack, Defense and Speed forms exist.
</p>

</div>

<script>

document.addEventListener("DOMContentLoaded",function(){

const audio=document.getElementById("bgmusic")
const slider=document.getElementById("volumeSlider")
const enter=document.getElementById("enter-screen")

if(audio){
audio.volume=0.15
}

if(enter){
enter.addEventListener("click",function(){

enter.style.opacity="0"
enter.style.pointerEvents="none"

setTimeout(function(){
enter.style.display="none"
},600)

if(audio){
audio.play().catch(()=>{})
}

})
}

if(slider&&audio){

slider.addEventListener("input",function(){
audio.volume=slider.value*0.3
})

}

document.addEventListener("mousemove",function(e){

const trail=document.createElement("img")

trail.src="images/trail.png"
trail.className="cursor-trail"

trail.style.left=e.pageX+"px"
trail.style.top=e.pageY+"px"

document.body.appendChild(trail)

setTimeout(function(){
trail.remove()
},600)

})

})
</script>

</body>
</html>
